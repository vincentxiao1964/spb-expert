{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">{% trans "Confirm Delete" %}</h4>
            </div>
            <div class="card-body">
                <p>{% trans "Are you sure you want to delete this news?" %}</p>
                <p><strong>{{ object.title }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-end">
                        <a href="{% url 'market:news_detail' object.pk %}" class="btn btn-secondary me-2">{% trans "Cancel" %}</a>
                        <button type="submit" class="btn btn-danger">{% trans "Confirm Delete" %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
