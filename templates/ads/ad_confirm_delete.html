{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">{% trans "Delete Advertisement" %}</h4>
            </div>
            <div class="card-body">
                <p>{% trans "Are you sure you want to delete this advertisement?" %}</p>
                <div class="card p-3 bg-light mb-3">
                    <h5>{{ object.title }}</h5>
                    {% if object.image %}
                    <img src="{{ object.image.url }}" class="img-fluid mt-2" style="max-height: 200px;" alt="{{ object.title }}">
                    {% endif %}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'ads:ad_detail' object.pk %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
                        <button type="submit" class="btn btn-danger">{% trans "Confirm Delete" %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
