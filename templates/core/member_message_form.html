{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h3>{% trans "编辑话题" %}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_content" class="form-label">{% trans "话题内容" %}</label>
                        <textarea name="content" id="id_content" class="form-control" rows="5" required>{{ form.content.value|default:'' }}</textarea>
                        {{ form.content.errors }}
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'member_messages' %}" class="btn btn-secondary">{% trans "取消" %}</a>
                        <button type="submit" class="btn btn-primary">{% trans "更新话题" %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
