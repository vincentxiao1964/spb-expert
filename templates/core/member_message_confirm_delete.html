{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">{% trans "删除话题" %}</h4>
            </div>
            <div class="card-body">
                <p>{% trans "您确定要删除此话题吗？" %}</p>
                <div class="card p-3 bg-light mb-3">
                    {{ object.content }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'member_messages' %}" class="btn btn-secondary">{% trans "取消" %}</a>
                        <button type="submit" class="btn btn-danger">{% trans "确认删除" %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
